name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "*.slnx"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "*.slnx"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.dotnet-version }})
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      matrix:
        dotnet-version: ["10.0.x"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: |
          dotnet restore src/LeaseGateLite.Contracts/LeaseGateLite.Contracts.csproj
          dotnet restore src/LeaseGateLite.Daemon/LeaseGateLite.Daemon.csproj
          dotnet restore tests/LeaseGateLite.Tests/LeaseGateLite.Tests.csproj

      - name: Build
        run: dotnet build tests/LeaseGateLite.Tests/LeaseGateLite.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/LeaseGateLite.Tests/LeaseGateLite.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.dotnet-version }}
          path: "**/TestResults/*.trx"
